<nav class="site-nav" role="navigation" aria-label="Navigation principale">
  <div class="nav-inner">

    <a href="{{ "/" | relURL }}" class="nav-logo" aria-label="KomiLab">
      <div class="nav-logo-badge">KL</div>
      <span class="nav-logo-text"><span>komi</span>lab</span>
    </a>

    <ul class="nav-links" id="nav-links" role="list">
      {{ range .Site.Menus.main }}
      <li>
        <a href="{{ .URL | relURL }}"
          {{ if or (eq $.RelPermalink .URL) (hasPrefix $.RelPermalink .URL) }}class="active" aria-current="page"{{ end }}>
          {{ .Name }}
        </a>
      </li>
      {{ end }}
    </ul>

    <div class="nav-actions">
      <a href="/labs/" class="btn-nav">
        Explorer les labs &rarr;
      </a>
      <button class="nav-hamburger" id="nav-hamburger"
        aria-label="Menu" aria-expanded="false" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>

  </div>
</nav>

<!-- Menu mobile -->
<div class="mobile-nav" id="mobile-nav" aria-label="Menu mobile">
  {{ range .Site.Menus.main }}
  <a href="{{ .URL | relURL }}"
    {{ if or (eq $.RelPermalink .URL) (hasPrefix $.RelPermalink .URL) }}class="active"{{ end }}>
    {{ .Name }}
  </a>
  {{ end }}
  <a href="/labs/" style="margin-top:0.5rem;color:var(--cyan);font-weight:600">
    Explorer les labs &rarr;
  </a>
</div>
