{{ define "main" }}
<div class="container">
  <div class="section-header" style="margin-bottom:var(--space-6)">
    <h1 class="section-title">Labs d'ingénierie</h1>
    <p class="section-subtitle">
      Documentation technique ultra-détaillée, orientée production.
      {{ len .Pages }} labs disponibles.
    </p>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar" role="group" aria-label="Filtrer par catégorie">
    <button class="filter-btn active" data-filter="all" type="button">Tous</button>
    <button class="filter-btn" data-filter="Réseaux" type="button">Réseaux</button>
    <button class="filter-btn" data-filter="Cybersécurité" type="button">Cybersécurité</button>
    <button class="filter-btn" data-filter="Virtualisation" type="button">Virtualisation</button>
    <button class="filter-btn" data-filter="Cloud" type="button">Cloud</button>
    <button class="filter-btn" data-filter="Linux" type="button">Linux</button>
    <button class="filter-btn" data-filter="Docker" type="button">Docker</button>
    <button class="filter-btn" data-filter="Automatisation" type="button">Automatisation</button>
    <button class="filter-btn" data-filter="Monitoring" type="button">Monitoring</button>
    <button class="filter-btn" data-filter="Audit" type="button">Audit</button>
  </div>

  <!-- LABS GRID -->
  <div class="labs-grid" id="labs-grid">
    {{ range .Pages }}
      {{ partial "lab/card.html" . }}
    {{ end }}
  </div>

  {{ template "_internal/pagination.html" . }}

</div>

<script>
(function(){
  document.querySelectorAll('.filter-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.filter-btn').forEach(function(b){
        b.classList.remove('active');
      });
      btn.classList.add('active');
      var filter = btn.dataset.filter;
      document.querySelectorAll('#labs-grid .lab-card').forEach(function(card){
        if(filter === 'all'){
          card.style.display = '';
        } else {
          var cats = card.dataset.categories || '';
          card.style.display = cats.indexOf(filter) !== -1 ? '' : 'none';
        }
      });
    });
  });
})();
</script>
{{ end }}
